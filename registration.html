<!DOCTYPE html>
<html>
    <head>
        <title>Event Registration</title>
        <link rel="stylesheet" href="registration.css">

        <!--Google Material Icons-->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">

    </head>
    <body>
        <div class="container">
            <h1>Register for UTeM Tech Talk 2026</h1>
            <hr>

            <div class="main-content">
                <!--DETAILS FORM-->
                <div class="left-section">

                    <!--DETAILS SECTION-->
                    <div class="form-card">
                        <div class="card-header">
                            <h2>1. Fill in Your Details</h2>
                        </div>
                        <div class="card-body">
                            <label>Full Name</label>
                            <br>
                            <input type="text" required>
                            <br>

                            <label>Matric Number</label>
                            <br>
                            <input type="text" required>
                            <br>

                            <label>Phone Number</label>
                            <br>
                            <input type="tel" placeholder="01x-xxxxxxx">
                            <br>

                            <label>E-mail Address</label>
                            <br>
                            <input type="email" >
                            <br>

                            <label>Faculty</label>
                            <br>
                            <select>
                                <option></option>
                                <option>FTMK</option>
                                <option>FTKEK</option>
                                <option>FTKM</option>
                                <option>FTKE</option>
                                <option>FPTT</option>
                                <option>FTKIP</option>
                            </select>
                            
                        </div>


                    </div>

                    <!--PAYMENT SECTION-->
                    <div class="payment-card">

                        <div class="card-header">
                            <h2>2. Payment</h2>
                        </div>

                        <div class="card-body">
                            <label>Online Banking by RMS</label>
                            <br>

                            <select>
                                <option></option>
                                <option>Maybank</option>
                                <option>CIMB</option>
                                <option>Bank Islam</option>
                                <option>Public Bank</option>
                            </select>

                            <div class="refund-policy">

                                <span class="material-symbols-outlined">
                                    warning
                                </span>

                                <strong>Cancelation & Refund Policy:</strong>

                                If you cancel your registration, 
                                please note that no refunds will be made

                            </div>

                            <hr>

                            <div class="payment-summary">

                                <p>Payment Summary</p>
                                <p>RM10.00</p>

                            </div>




                        </div>
                    </div>

                    <button>
                        Confirm Registration
                    </button>



                
                </div>
            </div>
        </div>

    </body>
</html>
