<!DOCTYPE html>
<html lang="en">

<head>
    <title>UTeM Eventify Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="addEvent.css">

    <!--Google Material Icons-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
</head>

<body>

    <div id="wrapper">

        <!-- SIDEBAR -->
        <nav id="sidebar">

            <div>

                <div id="logoSection">
                    <img src="logo.png" alt="logo">
                    <div id="logoText">
                        <span>UTeM</span>
                        <span>Eventify</span>
                    </div>
                </div>

                <div id="menu">

                    <ul>

                        <li><a href="dashboard.html">Dashboard</a></li>

                        <li>
                            <a class="activePage" href="event.html">
                                    Events
                            </a>
                        </li>

                        <li><a href="user.html">Users</a></li>
                        <li><a href="registrationDetails.html">Registration</a></li>
                        <li><a href="attendance.html">Attendance</a></li>
                        <li><a href="report.html">Reports</a></li>

                    </ul>

                </div>

            </div>

            <div id="signOut">
                <button type="button" onclick="window.location.href='login.html'">
                    Sign Out
                </button>
            </div>

        </nav>


        <!-- CONTENT -->
        <main>

            <div id="topContainer">
                <h1>Add New Event</h1>
                <p>Fill in the details to create a new event</p>
            </div>
            
            <div id="contentSection">
                <!--Event form-->
                <div id="formContainer">
                    <div id="titleSection">
                        <h3>Event Information</h3>
                    </div>

                    <form method="post" action="addeventprocess.php" enctype="multipart/form-data">
                        <label>Event Name <span class="required">*</span></label>
                        <input type="text" placeholder="Enter event name" name="event_name">

                        <label>Description <span class="required">*</span></label>
                        <textarea placeholder="Tell us about the event...." name="description"></textarea>

                        <div class="row">

                            <div class="inputBox">

                                <label>Date <span class="required">*</span></label>
                                <input type="date" name="event_date">

                            </div>

                            <div class="inputBox">

                                <label>Time <span class="required">*</span></label>
                                <input type="time" name="event_time">

                            </div>

                        </div>

                        <label>Venue <span class="required">*</span></label>
                        <input type="text" placeholder="Enter venue" name="venue">

                        <div class="row">

                            <div class="inputBox">

                                <label>Category <span class="required">*</span></label>
                                <select name="category">
                                    <option value="">Select Category</option>
                                    <option value="University Wide">University Wide</option>
                                    <option value="Faculty">Faculty</option>
                                    <option value="Residential College">Residential College</option>
                                </select>

                            </div>

                             <div class="inputBox">

                                <label>Fee <span class="required">*</span></label>
                                <input type="number" placeholder="RM x.xx" name="fee">

                            </div>

                        </div>

                        <label>Quota <span class="required">*</span></label>
                        <input type="number" placeholder="Enter maximum amount of participants" name="quota">

                        <label>Upload Poster <span class="required">*</span></label>
                        
                        <label for="poster" id="uploadBox">
                            <p class="uploadText">
                            <span class="clickText">Click to upload</span>
                            <span class="dragText">or drag and drop</span>
                            <p>PNG or JPEG up to 10MB</p>
                            </p>
                        </label>
                        <input type="file" id="poster" name="poster" accept=".png,.jpg,.jpeg" hidden>

                        <div id="buttonSection">

                            <button type="submit" id="saveBtn">
                                Save Event
                            </button>

                            <button type="reset" id="cancelBtn">
                                Cancel
                            </button>

                        </div>
                    </form>

                </div>

                <div id="previewContainer">

                    <h3>Preview</h3>

                    <div id="previewPoster">


                        <div class ="eventImage">
                            EVENT IMAGE-POSTER
                        </div>

                        <h2>Event Name</h2>

                        <p>
                            <span class="material-symbols-outlined">
                                calendar_month
                            </span>

                            Date
                        </p>

                        <p>
                            <span class="material-symbols-outlined">
                                location_on
                            </span>

                            Venue
                        </p>

                        <p>
                            <span class="material-symbols-outlined">
                                schedule
                            </span>

                            Time
                        </p>

                        <p>
                            <span class="material-symbols-outlined">
                                attach_money
                            </span>

                            Fee
                        </p>
                        
                    </div>
                    
                </div>

            </div>

        </main>

    </div>

</body>

</html>
